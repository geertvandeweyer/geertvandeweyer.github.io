system {
  number-of-cache-read-workers = 10 
  file-hash-batch-size = 50 
  file-hash-cache = true
  max-concurrent-workflows = 1000 
  new-workflow-poll-rate = 5
  max-workflow-launch-count = 50
  job-rate-control {
    jobs = 50 
    per = 1 second
  }
  io {
    number-of-requests = 100
    per = 10 seconds
    number-of-attempts = 10
    command-backpressure-staleness = 60 seconds
    backpressure-extension-log-threshold = 10 second
    # configures exponential backoff of io requests
    backpressure-backoff {
      # starting point
      min = 10 seconds
      # maximum waiting time between attempts
      max = 60 minutes
      # how much longer to wait between each attempt
      multiplier = 2
      # randomizes wait times to avoid large spikes. Must be between 0 and 1.
      randomization-factor = 0.9
    }
    timeout {
        # default I/O actions should complete rather fast
       default = 10 minutes
       # copying data in call caching can take more time
       copy = 5 hours
    }
    nio {
       # max parallel nio tasks (copy etc) ? reduce to see if it helps in timeouts. defaults to 10
       parallelism = 10 
    }
  }
  instrumentation-rate = 30 seconds
  workflow-heartbeats {
        write-failure-shutdown-duration = 8 minutes
        write-batch-size = 2500
        write-threshold = 2500
        ttl = 10 minutes
        heartbeat-interval = 2 minutes
        
  }
  job-restart-check-rate-control {
    jobs = 200
    per = 1 seconds
    # The maximum number of restart checks running against the database shouldn't be driven by backend job limits,
    # although the per-backend hog factor will be used for fair apportionment of restart tokens within a backend.
    max-jobs = 100
    # If logging of restart tokens is desired set the following to a positive value.
    # token-log-interval-seconds = 300
  }
  # retry error keys
  memory-retry-error-keys = ["OutOfMemory", "Killed"]
}

