apiVersion: apps/v1
kind: Deployment
metadata:
  name: funnel
  namespace: ${TES_NAMESPACE}
  labels:
    app: funnel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: funnel
  template:
    metadata:
      labels:
        app: funnel
    spec:
      nodeSelector:
        workload-type: system
        kubernetes.io/arch: arm64
      # service account name must match the Kubernetes ServiceAccount resource
      # we create earlier; the IAM role is attached via annotation, not here
      serviceAccountName: funnel
      containers:
        - name: funnel
          image: ${FUNNEL_IMAGE}
          imagePullPolicy: Always
          args: 
            - server
            - run
            - --config=/etc/funnel/funnel.yaml
          env:
            - name: AWS_REGION
              value: "${AWS_DEFAULT_REGION}"
            - name: S3_BUCKET
              value: "${TES_S3_BUCKET}"
            - name: AWS_DEFAULT_REGION
              value: "${AWS_DEFAULT_REGION}"
            - name: FUNNEL_S3_BUCKET
              value: "${TES_S3_BUCKET}"
          ports:
            - containerPort: ${FUNNEL_PORT}
              name: http
            - containerPort: 9090
              name: rpc
          volumeMounts:
            - name: config
              mountPath: /etc/funnel
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /service-info
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /service-info
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
      - name: config
        configMap:
          name: funnel-config
      - name: tmp
        emptyDir: {}