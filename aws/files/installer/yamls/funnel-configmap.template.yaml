apiVersion: v1
kind: ConfigMap
metadata:
  name: funnel-config
  namespace: ${TES_NAMESPACE}
data:
  # values substituted by envsubst when installer runs
  WORKDIR: /var/funnel-work
  EBS_AUTOSCALE: "true"
  funnel.yaml: |
    Database: boltdb
    Compute: kubernetes

    Server:
      HTTPPort: 8000
      RPCPort: 9090

    BoltDB:
      Path: /tmp/funnel.db

    Worker:
      WorkDir: /tmp/funnel-work-dir

    Kubernetes:
      Executor: kubernetes
      ServiceAccount: funnel
      Namespace: ${TES_NAMESPACE}      # ensure server operates in correct namespace
      DisableReconciler: false
      ReconcileRate: 10m
      Bucket: ${TES_S3_BUCKET}
      Region: ${AWS_DEFAULT_REGION}
      Template: |
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: {{.TaskId}}
          namespace: ${TES_NAMESPACE}
          labels:
            app: funnel-worker
            task-id: {{.TaskId}}
            task-name: {{.TaskNameLabel}}
        spec:
          backoffLimit: {{.BackoffLimit}}
          completions: 1
          template:
            metadata:
              annotations:
                karpenter.sh/do-not-disrupt: "true"
              labels:
                app: funnel-worker
                task-id: {{.TaskId}}
                task-name: {{.TaskNameLabel}}
            spec:
              nodeSelector:
                kubernetes.io/arch: amd64
              # this must be the Kubernetes service account, not the IAM role
              serviceAccountName: funnel
              hostPID: true
              restartPolicy: Never
              containers:
              - name: funnel-worker-{{.TaskId}}
                image: ${FUNNEL_IMAGE}
                imagePullPolicy: Always
                securityContext:
                  privileged: true
                env:
                - name: DOCKER_CONFIG
                  value: /opt/ecr-auth/.docker
                - name: PATH
                  value: /opt/ecr-auth/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
                args:
                  - "worker"
                  - "run"
                  - "--config"
                  - "/etc/config/funnel-worker.yaml"
                  - "--taskID"
                  - {{.TaskId}}
                resources:
                  requests:
                    cpu: {{if ne .Cpus 0}}{{.Cpus}}{{else}}"100m"{{end}}
                    memory: {{if ne .RamGb 0.0}}{{printf "\"%.0fG\"" .RamGb}}{{else}}"256M"{{end}}
                    ephemeral-storage: {{if ne .DiskGb 0.0}}{{printf "\"%.0fG\"" .DiskGb}}{{else}}"10G"{{end}}
                  limits:
                    cpu: {{if ne .Cpus 0}}{{.Cpus}}{{else}}"100m"{{end}}
                    memory: {{if ne .RamGb 0.0}}{{printf "\"%.0fG\"" .RamGb}}{{else}}"256M"{{end}}
                volumeMounts:
                - name: config-volume
                  mountPath: /etc/config
                - name: work-dir
                  mountPath: /var/funnel-work
                - name: containerd-socket
                  mountPath: /run/containerd
                - name: containerd-data
                  mountPath: /var/lib/containerd
                - name: nerdctl-data
                  mountPath: /var/lib/nerdctl
                - name: ecr-auth
                  mountPath: /opt/ecr-auth${EFS_WORKER_MOUNT}
              volumes:
              - name: config-volume
                configMap:
                  name: funnel-config
              - name: work-dir
                hostPath:
                  path: /var/funnel-work
                  type: DirectoryOrCreate
              - name: containerd-socket
                hostPath:
                  path: /run/containerd
                  type: Directory
              - name: containerd-data
                hostPath:
                  path: /var/lib/containerd
                  type: Directory
              - name: nerdctl-data
                hostPath:
                  path: /var/lib/nerdctl
                  type: DirectoryOrCreate
              - name: ecr-auth
                hostPath:
                  path: /opt/ecr-auth
                  type: DirectoryOrCreate${EFS_WORKER_VOLUME}
      PVTemplate: |
        apiVersion: v1
        kind: PersistentVolume
        metadata:
          name: "pv-{{.TaskId}}"
          namespace: "${TES_NAMESPACE}"
        spec:
          capacity:
            storage: 10Gi
          accessModes:
            - ReadWriteOnce
          persistentVolumeReclaimPolicy: Delete
          hostPath:
            path: /var/funnel-work   # use work directory rather than small /tmp
            type: Directory
          claimRef:
            name: "funnel-pvc-{{.TaskId}}"
            namespace: "${TES_NAMESPACE}"
      PVCTemplate: |
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: "funnel-pvc-{{.TaskId}}"
          namespace: "${TES_NAMESPACE}"
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
          volumeName: "pv-{{.TaskId}}"
  funnel-worker.yaml: |
    Database: boltdb

    BoltDB:
      Path: /tmp/funnel.db

    RPCClient:
      # point at the ClusterIP service created below; earlier versions used
      # "funnel" which no longer exists.  include the port variable so the
      # config follows whatever ${FUNNEL_PORT} is set to in env.variables.
      # connect to the gRPC port (9090) rather than the HTTP API port
      ServerAddress: "tes-service:9090"


    Worker:
      WorkDir: /var/funnel-work
      Container:
        DriverCommand: "nerdctl-wrap"
        # use placeholder __DOLLAR__ for dollar signs; these are restored after envsubst
        RunCommand: "run -i --net=host {{if .RemoveContainer}}--rm{{end}} {{range __DOLLAR__k, __DOLLAR__v := .Env}}--env {{__DOLLAR__k}}={{__DOLLAR__v}} {{end}} {{if .Name}}--name {{.Name}}{{end}} {{if .Workdir}}--workdir {{.Workdir}}{{end}} {{range .Volumes}}--volume {{.HostPath}}:{{.ContainerPath}}:{{if .Readonly}}ro{{else}}rw{{end}} {{end}} ${EFS_NERDCTL_MOUNT}{{.Image}} {{.Command}}"
        PullCommand: "pull {{.Image}}"
        StopCommand: "rm -f {{.Name}}"

    Kubernetes:
      # use nerdctl on the node image (docker binary is not installed)
      Executor: nerdctl
      Namespace: ${TES_NAMESPACE}

    AmazonS3:
      Disabled: false
