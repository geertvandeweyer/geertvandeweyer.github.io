# GitHub Pages Jekyll Configuration

title: "Cromwell + TES on Kubernetes"
description: "Guides to run Cromwell, TES (Funnel), and Karpenter across cloud platforms"
author: "Geert Vandeweyer"
baseurl: ""  # User site (geertvandeweyer.github.io), no baseurl needed
url: "https://geertvandeweyer.github.io"

# Jekyll theme (minimal, with custom override)
# theme: jekyll-theme-architect

# Markdown processor
markdown: kramdown

# Custom CSS
sass:
  style: compressed

# Additional configurations
plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata

exclude:
  - "*.sh"
  - ".git"
  - "node_modules"
  - "Dockerfile"
  - "go.mod"
  - "Makefile"
