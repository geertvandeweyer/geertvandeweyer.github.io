# GitHub Pages Jekyll Configuration
# Theme: Minimal Mistakes or Just the Docs (modify as needed)

title: "Deployment & Infrastructure Documentation"
description: "Complete guides for Cromwell, TES (Funnel), and Karpenter across cloud platforms"
author: "Geert Van de Weyer"
baseurl: ""  # User site (geertvandeweyer.github.io), no baseurl needed
url: "https://geertvandeweyer.github.io"

# Jekyll theme
theme: jekyll-theme-minimal

# Markdown processor
markdown: kramdown

# Navigation
nav:
  - title: "Home"
    url: "/"
  - title: "Installation Guide"
    url: "/installation-guide/"
  - title: "Container Images"
    url: "/container-images/"
  - title: "OVH CLI Guide"
    url: "/ovh-cli-guide/"
  - title: "Cost & Infrastructure"
    url: "/cost-and-infra/"

# Additional configurations
plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata

exclude:
  - "*.sh"
  - ".git"
  - "node_modules"
  - "Dockerfile"
  - "go.mod"
  - "Makefile"
