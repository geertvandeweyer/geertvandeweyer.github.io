# OVH S3 credentials secret — populated by installer from env.variables.
# Created by: envsubst < s3-secret.template.yaml | kubectl apply -f -
# Values must be base64-encoded by the installer before substitution.
apiVersion: v1
kind: Secret
metadata:
  name: ovh-s3-credentials
  namespace: ${TES_NAMESPACE}
type: Opaque
data:
  # base64-encoded values; installer encodes these from env.variables
  s3_access_key: ${OVH_S3_ACCESS_KEY_B64}
  s3_secret_key: ${OVH_S3_SECRET_KEY_B64}
